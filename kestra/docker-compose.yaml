volumes:
  postgres-data-projet12:
    driver: local
  kestra-data-projet12:
    driver: local
  redpanda-data:
    driver: local
services:
  postgres:
    image: postgres:18
    volumes:
      - postgres-data-projet12:/var/lib/postgresql
    ports:
      # - "5432:5432"
      - "5433:5432"
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10

  kestra:
    build:
      context: .
      dockerfile: Dockerfile.kestra
    image: kestra_custom_projet12:latest
    container_name: kestra_projet12
    pull_policy: always
    # Kestra, by default, has a termination grace period of 5m. We need to wait a little more to be sure no active tasks are running.
    stop_grace_period: 6m
    # Note that this setup with a root user is intended for development purpose.
    # Our base image runs without root, but the Docker Compose implementation needs root to access the Docker socket
    user: "root"
    command: server standalone
    volumes:
      - kestra-data-projet12:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
      - C:/Users/zakar_2tvurct/Desktop/Formation_Data_Engineer/Projet_12/Projet_12/sport_data_solution:/data/sport_data_solution
    env_file:
        - ../.env
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        kestra:
          # server:
          #   basic-auth:
          #     username: admin@kestra.io # it must be a valid email address
          #     password: Admin1234! # it must be at least 8 characters long with uppercase letter and a number
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_started

  # 🔴 REDPANDA

  redpanda-0:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.4
    container_name: redpanda-0
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda-0:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda-0:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda-0:33145
      - --advertise-rpc-addr redpanda-0:33145
      - --mode dev-container
      - --smp 1
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
      - "19644:9644"

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.5.0
    container_name: redpanda-console
    depends_on:
      - redpanda-0
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda-0:9092"]
    ports:
      - "8082:8080"

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.4
    depends_on:
      - redpanda-0
    entrypoint: >
      bash -c "
      sleep 15 &&
      rpk topic create sport_activity --brokers redpanda-0:9092 || true
      "
  producer:
    build: ../producer
    container_name: producer
    depends_on:
      - redpanda-0
      - postgres
    env_file:
      - ../.env
    volumes:
      - ../sport_data_solution:/data/sport_data_solution
      - ../producer:/app
    networks:
      - default