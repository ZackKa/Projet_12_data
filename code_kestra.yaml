  - id: distances_domicile_travail    # Tâche pour calculer les distances domicile-travail
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    retry:
        type: constant         # type de retry : constant, exponential, etc.
        maxAttempt: 3          # nombre de tentatives
        interval: PT30S        # intervalle entre tentatives (ISO 8601 : PT30S = 30 secondes)
    script: |
      import pandas as pd        # Librairie pour manipulation de données
      import requests            # Librairie pour appels HTTP
      import time                # Librairie pour gestion des délais
      import os                  # Librairie pour accéder aux variables d'environnement
      from sqlalchemy import create_engine  # Connexion à une base SQL

      API_KEY = os.getenv("ORS_API_KEY")    # Récupère la clé API depuis les variables d'environnement

      entreprise = "1362 Av. des Platanes, 34970 Lattes"    # Adresse de l'entreprise pour le calcul des distances

      print("Connexion à PostgreSQL...")
      engine = create_engine("postgresql+psycopg2://kestra:k3str4@postgres:5432/kestra")

      print("Lecture des données RH...")
      df = pd.read_sql("SELECT * FROM poc_rh_raw", engine)    # Lecture de la table RH brute depuis PostgreSQL

      print("Lecture des paramètres...")
      params = pd.read_sql("SELECT * FROM poc_config_parameters", engine)   # Lecture des paramètres de configuration

      param_dict = dict(zip(params["param_name"], params["value"]))   # Conversion des paramètres en dictionnaire

      max_walk_km = param_dict["max_walk_km"]  # Distance maximale autorisée pour la marche
      max_bike_km = param_dict["max_bike_km"]  # Distance maximale autorisée pour le vélo

      print("Paramètres chargés :")
      print("max_walk_km =", max_walk_km)
      print("max_bike_km =", max_bike_km)

      print(f"{len(df)} salariés à traiter")

      cache = {}    # Cache pour éviter de géocoder plusieurs fois la même adresse

      def geocode(adresse, retries=3):    # Fonction pour convertir une adresse en coordonnées GPS
        # La fonction geocode transforme n’importe quelle adresse en coordonnées GPS et stocke le résultat pour éviter de répéter les appels API.

          if adresse in cache:
              return cache[adresse]   # Retourne les coordonnées déjà en cache

          url = "https://api.openrouteservice.org/geocode/search"   # Endpoint API de géocodage
          params = {"api_key": API_KEY, "text": adresse}    # Paramètres pour l'API

          for i in range(retries):    # Tentatives en cas d'erreur

              try:
                  r = requests.get(url, params=params).json()   # Requête GET pour géocoder

                  time.sleep(0.2)   # pause API pour éviter la surcharge de l'API

                  if r["features"]:
                      coords = r["features"][0]["geometry"]["coordinates"]  # Récupération des coordonnées
                      result = (coords[1], coords[0])  # Conversion en (latitude, longitude)
                      cache[adresse] = result  # Stockage dans le cache
                      return result

              except Exception as e:
                  print(f"Erreur géocodage {adresse} tentative {i+1}: {e}") # Log des erreurs
                  time.sleep(2) # Attente avant la prochaine tentative

          return (None, None) # Retourne None si échec du géocodage


      print("Géocodage de l'adresse de l'entreprise...")

      lat_ent, lon_ent = geocode(entreprise)  # Géocodage de l'entreprise

      if lat_ent is None:
          raise Exception("Impossible de géocoder l'adresse de l'entreprise")   # Erreur si géocodage échoue

      print(f"Coordonnées entreprise : {lat_ent}, {lon_ent}")


      def distance(adresse):    # Fonction pour calculer la distance entre domicile et entreprise
        #La fonction distance calcule la distance réelle domicile-travail via API, en utilisant les coordonnées GPS et les routes existantes

          lat1, lon1 = geocode(adresse)   # Géocodage de l'adresse du salarié

          if None in [lat1, lon1, lat_ent, lon_ent]:
              return None   # Retourne None si géocodage impossible

          url = "https://api.openrouteservice.org/v2/directions/driving-car"    # Endpoint pour calculer itinéraire
          headers = {"Authorization": API_KEY}    # Header avec la clé API
          body = {"coordinates": [[lon1, lat1], [lon_ent, lat_ent]]}    # Coordonnées départ/arrivée

          for i in range(3):   # Tentatives pour l'API

              try:
                  r = requests.post(url, json=body, headers=headers).json()   # Requête POST pour récupérer distance

                  time.sleep(0.2)   # pause API

                  # S’il y a une clé "routes", cela veut dire que l’API a trouvé un trajet valide.
                  if "routes" in r:
                      return r["routes"][0]["summary"]["distance"] / 1000   # Conversion de mètre en km

              except Exception as e:
                  print(f"Erreur distance tentative {i+1}: {e}")    # Log des erreurs
                  time.sleep(2)

          return None


      rows = []   # Liste pour stocker les résultats

      print("Calcul des distances domicile-travail...")

      for i, row in df.iterrows():    # Boucle sur chaque salarié

          if i % 10 == 0:
              print(f"{i} salariés traités...")     # Progression tous les 10 salariés

          dist_km = None
          valide = False

          try:

              dist_km = distance(row["adresse"])  # Calcul de la distance domicile-travail

              transport = str(row["moyen_deplacement"]).lower()   # Normalisation des caracteres du moyen de transport

              if "marche" in transport or "running" in transport:
                  valide = dist_km is not None and dist_km <= max_walk_km   # Validation pour marche/run

              elif "vélo" in transport or "trottinette" in transport:
                  valide = dist_km is not None and dist_km <= max_bike_km   # Validation pour vélo/trottinette

          except Exception as e:
              print(f"Erreur pour salarié {row['id_salarie']} : {e}")   # Log des erreurs pour un salarié

          rows.append({
              "id_salarie": row["id_salarie"],
              "nom": row["nom"],
              "prenom": row["prenom"],
              "adresse": row["adresse"],
              "moyen_deplacement": row["moyen_deplacement"],
              "distance_km": dist_km,
              "declaration_valide": valide
          })    # Ajout des résultats dans la liste


      print("Transformation en DataFrame final...")
      df_out = pd.DataFrame(rows)   # Conversion de la liste en DataFrame

      print("Insertion dans PostgreSQL...")

      df_out.to_sql(
          "poc_employees_enriched",
          engine,
          if_exists="replace",
          index=False
      )

      print("Toutes les distances calculées et table mise à jour")
      print(f"{len(df_out)} distances calculées")

      from kestra import Kestra
      Kestra.outputs({
          "nb_distances": len(df_out)
      })

