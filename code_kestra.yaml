  - id: consume_kafka_sport_activity    # Tâche pour consommer les données redpanda
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    retry:
      type: constant
      maxAttempt: 3
      interval: PT30S
    script: |
      import json                       # Pour décoder les messages JSON de Kafka
      import pandas as pd               # Pour manipulation des données en DataFrame
      from kafka import KafkaConsumer   # Pour consommer les messages depuis Kafka/Redpanda
      from sqlalchemy import create_engine  # Pour connexion à PostgreSQL
      from datetime import datetime     # Pour manipulation des dates
      import time                       # Pour pauses 

      KAFKA_BROKER = "redpanda-0:9092"   # Adresse du broker Redpanda
      TOPIC = "sport_activity"           # Nom du topic Kafka à consommer

      # Connexion PostgreSQL
      engine = create_engine("postgresql+psycopg2://kestra:k3str4@postgres:5432/kestra")
      print("Début de la récupération des activités depuis Kafka")

      # Création du consumer Kafka
      consumer = KafkaConsumer(
          TOPIC,
          bootstrap_servers=[KAFKA_BROKER],                     # Serveur Kafka/Redpanda
          value_deserializer=lambda m: json.loads(m.decode('utf-8')),  # Décodage JSON des messages
          auto_offset_reset='earliest',                          # Lire depuis le début du topic si offset manquant
          enable_auto_commit=True,                                # Valider automatiquement la consommation
          consumer_timeout_ms=5000                                # Timeout si aucun message reçu
      )

      activities = []  # Liste pour stocker les activités reçues
      for message in consumer:  # Boucle sur tous les messages du topic
          activity = message.value  # Récupération du contenu JSON
          # Normalisation date
          if "date_debut" in activity:
              activity["date_debut"] = pd.to_datetime(activity["date_debut"])  # Convertit en datetime pandas
          activities.append(activity)  # Ajout dans la liste

      if activities:  # Si des activités ont été reçues
          df = pd.DataFrame(activities)  # Conversion en DataFrame
          print(f"{len(df)} activités reçues depuis Kafka")  # Log du nombre d'activités
          # Insertion en table clean (vide)
          with engine.begin() as conn:
              conn.exec_driver_sql("TRUNCATE TABLE poc_sport_activity RESTART IDENTITY;")
          df.to_sql("poc_sport_activity", engine, if_exists="append", index=False)    # Insertion dans PostgreSQL
      else:
          print("Aucune activité reçue depuis Kafka")   # Log si aucune activité

      from kestra import Kestra
      Kestra.outputs({
          "nb_activities_kafka": len(activities)
      })

