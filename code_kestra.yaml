  - id: send_encouragement_messages    # Tâche pour envoyer des messages d'encouragement sur Slack
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    retry:
      type: constant
      maxAttempt: 3          # Réessayer la tâche 3 fois en cas d'échec
      interval: PT30S        # Intervalle de 30 secondes entre chaque tentative
    script: |
      import pandas as pd                      # Pour manipuler les données en DataFrame
      from sqlalchemy import create_engine, text  # Connexion et requêtes SQL
      import requests                          # Pour envoyer les messages via API HTTP
      from faker import Faker                   # Pour choisir aléatoirement des templates
      import os                                # Pour lire les variables d'environnement
      import time                               # Pour pauses

      fake = Faker("fr_FR")                     # Faker en français pour templates aléatoires
      WEBHOOK_URL = os.getenv("SLACK_WEBHOOK")  # Lecture de l'URL du webhook Slack
      if not WEBHOOK_URL:
          raise ValueError("La variable SLACK_WEBHOOK n'est pas définie !")  # Stop si webhook absent

      engine = create_engine("postgresql+psycopg2://kestra:k3str4@postgres:5432/kestra")  # Connexion PostgreSQL

      # Templates de messages Slack
      slack_templates = [
          "🎉 Bravo {prenom} {nom} ! Super sortie de {sport} le {date} ! 💪",
          "🏅 {prenom} {nom} a fait une belle séance de {sport} le {date} ! Continue comme ça !",
          "🔥 {prenom} {nom}, ton activité {sport} du {date} est impressionnante !",
          "⚡ {prenom} {nom} a accompli un superbe {sport} le {date} ! Félicitations !",
          "💪 {prenom} {nom}, bravo pour ta séance de {sport} le {date} ! Gardons cette énergie !"
      ]

      # Lire toutes les activités
      # activities = pd.read_sql("SELECT * FROM poc_sport_activity", engine)
      # JOIN pour récupérer prénom / nom
      activities = pd.read_sql("""
          SELECT a.*, r.prenom, r.nom
          FROM poc_sport_activity a
          LEFT JOIN poc_rh_raw r
              ON a.id_salarie = r.id_salarie
      """, engine)

      max_attempts = 3       # Nombre de tentatives pour l'envoi Slack
      retry_interval = 5     # Délai en secondes entre chaque tentative

      for _, row in activities.iterrows():  # Boucle sur chaque activité
          id_activite = row['id_activite']  # ID unique de l'activité

          # Vérifier si un message a déjà été envoyé
          msg_exist = pd.read_sql(
              "SELECT 1 FROM poc_sport_activity_messages WHERE id_activite = %s",
              engine, params=(id_activite,)
          )

          if msg_exist.empty:  # Si aucun message existant
              # Générer message naturel
              template = fake.random_element(slack_templates)  # Choix aléatoire d'un template

              message = template.format(
                  prenom=row['prenom'] if pd.notnull(row['prenom']) else "Utilisateur",  # Valeur par défaut si prénom manquant
                  nom=row['nom'] if pd.notnull(row['nom']) else "",                         # Valeur par défaut si nom manquant
                  sport=row['type_sport'],                                                 # Type de sport
                  date=pd.to_datetime(row['date_debut']).strftime('%d/%m/%Y')              # Format date JJ/MM/AAAA
              )

              # Boucle de retry pour l'envoi Slack
              for attempt in range(1, max_attempts + 1):
                  try:
                      requests.post(WEBHOOK_URL, json={"text": message})
                      print(f"Message envoyé pour activité {id_activite} (tentative {attempt})")
                      
                      # Historisation du message dans la base uniquement si envoi réussi
                      with engine.begin() as conn:
                          conn.execute(
                              text("INSERT INTO poc_sport_activity_messages (id_activite, message) VALUES (:id_activite, :message)"),
                              {"id_activite": id_activite, "message": message}
                          )
                      break  # Sort de la boucle de retry si succès

                  except Exception as e:
                      print(f"Erreur envoi Slack pour {id_activite} à la tentative {attempt} : {e}")
                      if attempt < max_attempts:
                          print(f"Nouvelle tentative dans {retry_interval} secondes...")
                          time.sleep(retry_interval)
                      else:
                          print(f"Échec après {max_attempts} tentatives pour activité {id_activite}")
          else:
              print(f"Message déjà envoyé pour activité {id_activite}, skip")  # Message déjà existant, ne pas renvoyer

  - id: create_sport_activity_clean_table   # Tâche pour créer une table "propre" d'activités sportives
    type: io.kestra.plugin.jdbc.postgresql.Queries
    url: jdbc:postgresql://postgres:5432/kestra
    username: kestra
    password: k3str4
    retry:
      type: constant
      maxAttempt: 3
      interval: PT15S
    sql: |
      
      DROP TABLE IF EXISTS poc_sport_activity_clean;

      CREATE TABLE poc_sport_activity_clean AS

      SELECT
        id_activite,
        id_salarie,
        date_debut,
        type_sport,
        distance_m,
        duree_min,
        commentaire

      FROM poc_sport_activity

      WHERE
        id_salarie IS NOT NULL
        AND type_sport IS NOT NULL
        AND duree_min > 0
        AND (distance_m IS NULL OR distance_m >= 0)
        AND date_debut::date <= CURRENT_DATE
        AND date_debut::date >= (CURRENT_DATE - INTERVAL '1 year')::date;

  - id: test_poc_sport_activity_clean
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    script: |
      import pytest
      import pandas as pd
      from sqlalchemy import create_engine
      from datetime import datetime
      from dateutil.relativedelta import relativedelta
      import sys
      import subprocess

      # Création d'un fichier temporaire pour le test pytest
      test_code = '''import pandas as pd
      from sqlalchemy import create_engine
      from datetime import datetime
      from dateutil.relativedelta import relativedelta

      def test_poc_sport_activity_clean():
          engine = create_engine("postgresql+psycopg2://kestra:k3str4@postgres:5432/kestra")
          df = pd.read_sql("SELECT * FROM poc_sport_activity_clean", engine)

          today = datetime.now().date()
          min_date = today - relativedelta(years=1)
          errors = []

          # id_salarie null
          invalid_id = df[df["id_salarie"].isnull()]
          if not invalid_id.empty:
              print("id_salarie NULL détecté :")
              print(invalid_id)
              errors.append("id_salarie null")

          # type_sport null
          invalid_sport = df[df["type_sport"].isnull()]
          if not invalid_sport.empty:
              print("type_sport NULL détecté :")
              print(invalid_sport)
              errors.append("type_sport null")

          # distance négative
          invalid_distance = df[df["distance_m"].notnull() & (df["distance_m"] < 0)]
          if not invalid_distance.empty:
              print("distance négative détectée :")
              print(invalid_distance)
              errors.append("distance negative")

          # conversion des dates
          dates = pd.to_datetime(df["date_debut"]).dt.date

          # date dans le futur
          invalid_future = df[dates > today]
          if not invalid_future.empty:
              print("date_debut dans le futur :")
              print(invalid_future)
              errors.append("date future")

          # date trop ancienne
          invalid_old = df[dates < min_date]
          if not invalid_old.empty:
              print("date_debut trop ancienne :")
              print(invalid_old)
              errors.append("date trop ancienne")

          assert not errors, f"Tests échoués : {errors}"'''

      # Sauvegarde dans un fichier temporaire
      with open("tmp_test_poc_sport_activity_clean.py", "w") as f:
          f.write(test_code)

      # Lancement de pytest sur ce fichier
      result = subprocess.run([sys.executable, "-m", "pytest", "tmp_test_poc_sport_activity_clean.py", "-v"], check=False)

      # Si pytest échoue, on arrête le workflow
      if result.returncode != 0:
          raise Exception("Le test pytest a échoué")

  - id: create_fact_prime_sportive    # Tâche pour créer la table des primes sportives des salariés
    type: io.kestra.plugin.jdbc.postgresql.Queries
    url: jdbc:postgresql://postgres:5432/kestra
    username: kestra
    password: k3str4
    retry:
      type: constant
      maxAttempt: 3
      interval: PT15S
    sql: |
      /*
      Cette task PostgreSQL crée la table des primes sportives poc_fact_prime_sportive.
      Elle combine les données RH (poc_rh_raw) et les distances calculées (poc_employees_enriched) pour déterminer :
      - eligibility : le salarié a-t-il rempli correctement sa déclaration ?
      - montant de la prime : calculé en multipliant le salaire par le taux de prime défini dans poc_config_parameters.
      Permet d’obtenir une table prête à être utilisée pour la paie ou le reporting.
      */
      
      DROP TABLE IF EXISTS poc_fact_prime_sportive;

      CREATE TABLE poc_fact_prime_sportive AS

      SELECT
        rh.id_salarie,
        rh.salaire_brut,

        CASE
          WHEN emp.declaration_valide = TRUE THEN TRUE
          ELSE FALSE
        END AS eligible_prime,

        CASE
          WHEN emp.declaration_valide = TRUE
          THEN rh.salaire_brut * (
            SELECT value
            FROM poc_config_parameters
            WHERE param_name = 'prime_rate'
          )
          ELSE 0
        END AS montant_prime

      FROM poc_rh_raw rh

      LEFT JOIN poc_employees_enriched emp
        ON rh.id_salarie = emp.id_salarie;

  - id: create_fact_bien_etre
    type: io.kestra.plugin.jdbc.postgresql.Queries
    url: jdbc:postgresql://postgres:5432/kestra
    username: kestra
    password: k3str4
    retry:
      type: constant
      maxAttempt: 3
      interval: PT15S
    sql: |
      /*
      Cette task PostgreSQL crée la table des primes bien-être poc_fact_bien_etre.
      Elle combine les données RH (poc_rh_raw) et les activités sportives nettoyées (poc_sport_activity_clean) pour déterminer :
      - nb_activites : nombre d'activités sportives réalisées par le salarié
      - eligible_bien_etre : le salarié a-t-il atteint le nombre minimum d'activités défini dans poc_config_parameters
      Permet d’obtenir une table prête à être utilisée pour le reporting bien-être ou pour le calcul de primes associées.
      */

      DROP TABLE IF EXISTS poc_fact_bien_etre;

      CREATE TABLE poc_fact_bien_etre AS

      WITH activity_count AS (
        SELECT
          id_salarie,
          COUNT(*) AS nb_activites
        FROM poc_sport_activity_clean
        GROUP BY id_salarie
      )

      SELECT
        rh.id_salarie,

        COALESCE(ac.nb_activites, 0) AS nb_activites,

        CASE
          WHEN COALESCE(ac.nb_activites, 0) >= (
            SELECT value
            FROM poc_config_parameters
            WHERE param_name = 'min_activities'
          )
          THEN TRUE
          ELSE FALSE
        END AS eligible_bien_etre

      FROM poc_rh_raw rh

      LEFT JOIN activity_count ac
        ON rh.id_salarie = ac.id_salarie;

  - id: create_kpi_global
    type: io.kestra.plugin.jdbc.postgresql.Queries
    url: jdbc:postgresql://postgres:5432/kestra
    username: kestra
    password: k3str4
    retry:
      type: constant
      maxAttempt: 3
      interval: PT15S
    sql: |
      /*
      Cette task PostgreSQL crée la table globale des KPI des salariés : poc_kpi_global.
      Elle combine les informations RH, les distances domicile-travail, les primes sportives et les primes bien-être pour chaque salarié.
      Colonnes principales :
      - id_salarie, nom, prenom, salaire_brut : informations de base du salarié
      - distance_km : distance domicile-travail issue de poc_employees_enriched
      - eligible_prime, montant_prime : éligibilité et montant de la prime sportive
      - nb_activites, eligible_bien_etre : nombre d'activités réalisées et éligibilité à la prime bien-être
      Cette table sert à alimenter le reporting global.
      */
      
      DROP TABLE IF EXISTS poc_kpi_global;

      CREATE TABLE poc_kpi_global AS

      SELECT
        rh.id_salarie,
        rh.nom,
        rh.prenom,
        rh.salaire_brut,

        emp.distance_km,

        prime.eligible_prime,
        prime.montant_prime,

        be.nb_activites,
        be.eligible_bien_etre

      FROM poc_rh_raw rh

      LEFT JOIN poc_employees_enriched emp
        ON rh.id_salarie = emp.id_salarie

      LEFT JOIN poc_fact_prime_sportive prime
        ON rh.id_salarie = prime.id_salarie

      LEFT JOIN poc_fact_bien_etre be
        ON rh.id_salarie = be.id_salarie;

