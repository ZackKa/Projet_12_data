  - id: create_raw_tables     # Tâche pour créer les tables brutes RH et sportives
    type: io.kestra.plugin.jdbc.postgresql.Queries    # Exécution de requêtes SQL PostgreSQL
    url: jdbc:postgresql://postgres:5432/kestra
    username: kestra
    password: k3str4
    retry:
        type: constant
        maxAttempt: 3
        interval: PT15S
