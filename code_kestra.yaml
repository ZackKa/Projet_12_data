  - id: load_raw_tables     # Tâche pour charger les fichiers Excel dans les tables PostgreSQL
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    retry:
        type: constant         # type de retry : constant, exponential, etc.
        maxAttempt: 3          # nombre de tentatives
        interval: PT30S        # intervalle entre tentatives (ISO 8601 : PT30S = 30 secondes)
    inputFiles:
      rh.xlsx: "{{ outputs.ingestion_all.outputFiles['data/rh.xlsx'] }}"    # Injection du fichier RH depuis l’étape d’ingestion
      sportive.xlsx: "{{ outputs.ingestion_all.outputFiles['data/sportive.xlsx'] }}"    # Injection du fichier sport
    script: |
      import pandas as pd # Bibliothèque pour manipuler les données
      from sqlalchemy import create_engine # Pour se connecter à PostgreSQL via SQLAlchemy
      #SQLAlchemy sert à interagir avec des bases de données en Python de manière plus simple et orientée objets, sans écrire directement du SQL.

      # connexion postgres
      engine = create_engine("postgresql+psycopg2://kestra:k3str4@postgres:5432/kestra") # Crée le moteur SQLAlchemy pour PostgreSQL

      # lecture fichiers
      df_rh = pd.read_excel("rh.xlsx")  # Lit le fichier RH Excel
      df_sport = pd.read_excel("sportive.xlsx")   # Lit le fichier Sportive Excel

      # renommage colonnes pour correspondre aux tables SQL
      df_rh.columns = [
          "id_salarie",
          "nom",
          "prenom",
          "date_naissance",
          "bu",
          "date_embauche",
          "salaire_brut",
          "type_contrat",
          "nb_cp",
          "adresse",
          "moyen_deplacement"
      ]
      # Assure la correspondance entre colonnes Excel et table SQL RH

      df_sport.columns = [
          "id_salarie",
          "sport"
      ]
      # Assure la correspondance entre colonnes Excel et table SQL sport

      print("RH rows:", len(df_rh))   # Affiche le nombre de lignes RH lues
      print("SPORT rows:", len(df_sport))   # Affiche le nombre de lignes Sportives lues

      # insertion dans postgres if_exists="replace" pour remplacer et if_exists="append" pour ajouter
      df_rh.to_sql("poc_rh_raw", engine, if_exists="replace", index=False)  # Insère les données RH dans PostgreSQL
      df_sport.to_sql("poc_sportive_raw", engine, if_exists="replace", index=False)   # Insère les données Sportive dans PostgreSQL

      print("Insertion terminée")


      from kestra import Kestra   # Module Kestra pour retourner des outputs
      Kestra.outputs({
          "rh_rows": len(df_rh),
          "sport_rows": len(df_sport)
      })  # Retourne les informations vers Kestra pour usage dans d’autres tâches

  - id: test_poc_rh_raw   # Tâche pour tester la qualité des données RH brutes
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
        type: io.kestra.plugin.core.runner.Process
    script: |
        import pytest # Framework de tests Python
        import pandas as pd # Manipulation des données
        from sqlalchemy import create_engine # Connexion à PostgreSQL
        import sys  # sys sert à interagir avec l’environnement d’exécution Python lui-même
        import subprocess # Pour exécuter pytest en sous-process

        test_code = '''import pandas as pd
        from sqlalchemy import create_engine

        def test_poc_rh_raw():
            engine = create_engine("postgresql+psycopg2://kestra:k3str4@postgres:5432/kestra")    # Connexion à la DB
            df = pd.read_sql("SELECT * FROM poc_rh_raw", engine)    # Lecture de la table RH brute

            errors = []   # Liste pour stocker les erreurs de tests

            # Valeurs manquantes
            missing = df.isnull().sum()
            if missing.sum() > 0:
                print("Valeurs manquantes détectées :")
                print(missing[missing > 0])
                errors.append(f"Valeurs manquantes: {missing[missing > 0].to_dict()}")

            # Doublons
            duplicates = df.duplicated()
            if duplicates.sum() > 0:
                print("Doublons détectés :")
                print(df[duplicates])
                errors.append(f"Doublons: {duplicates.sum()}")

            # Salaire positif
            invalid_salaire = df[df["salaire_brut"] <= 0]
            if not invalid_salaire.empty:
                print("Salaire négatif ou nul détecté :")
                print(invalid_salaire)
                errors.append("salaire_brut ≤ 0")

            # Nombre de congés positif ou égal à 0
            invalid_cp = df[df["nb_cp"] < 0]
            if not invalid_cp.empty:
                print("Nombre de congés négatif détecté :")
                print(invalid_cp)
                errors.append("nb_cp < 0")

            # Cohérence des dates : naissance ≤ date_embauche - 18 ans
            invalid_dates = df[
                pd.to_datetime(df["date_naissance"]).dt.date > (pd.to_datetime(df["date_embauche"]).dt.date - pd.to_timedelta(18*365, unit='d'))
            ]
            if not invalid_dates.empty:
                print("Incohérence de dates (âge < 18 ans à l'embauche) détectée :")
                print(invalid_dates)
                errors.append("date_naissance trop récente / âge < 18 ans à l'embauche")

            assert not errors, f"Tests échoués : {errors}"'''
        # Création du fichier temporaire et exécution du test
        with open("tmp_test_poc_rh_raw.py", "w") as f:
            f.write(test_code)

        result = subprocess.run([sys.executable, "-m", "pytest", "tmp_test_poc_rh_raw.py", "-v"], check=False)    # Exécution pytest

        if result.returncode != 0:
            raise Exception("Le test pytest a échoué")    # Stoppe la task si test échoue

