triggers:
  - id: daily_trigger
    type: io.kestra.core.models.triggers.types.Schedule   # Type de trigger : planification basée sur un calendrier (Schedule)
    cron: "0 9 * * *"
      # Expression CRON qui définit quand le pipeline doit s’exécuter automatiquement
      # Décodage :
      #   - 0 minute
      #   - 9 heure (9h00 du matin)
      #   - * jour du mois (tous les jours du mois)
      #   - * mois (tous les mois)
      #   - * jour de la semaine (tous les jours)
      # Donc : le pipeline se déclenche tous les jours à 9h00

